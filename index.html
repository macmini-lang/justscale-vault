<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | JustScale</title>
    <meta name="description" content="Everything we use to scale info products with paid ads. The SOPs, the calls, the funnels, the ads. All of it.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css?v=20260407k">
    <style>
        nav .nav-links { display: none !important; }
        nav .ham { display: none !important; }
        nav .container { justify-content: center; }

        .funnel-hero {
            text-align: center;
            padding: 84px 28px 0;
            max-width: 720px;
            margin: 0 auto;
        }
        .funnel-hero h1 {
            font-size: clamp(1.6rem, 3.2vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 12px;
        }
        .funnel-hero .sub {
            font-size: 1.05rem;
            color: var(--text-s);
            line-height: 1.6;
        }

        .funnel-watch {
            text-align: center;
            padding: 28px 0 0;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-m);
        }

        .funnel-vsl {
            max-width: 1000px;
            margin: 0 auto;
            padding: 12px 28px 0;
        }
        .funnel-vsl-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            border: 2px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .funnel-vsl-box span {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .funnel-vsl-sub {
            text-align: center;
            padding: 40px 28px 16px;
            margin: 0 auto;
        }
        .funnel-vsl-sub p {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-s);
            line-height: 1.5;
        }

        .funnel-form {
            max-width: 900px;
            margin: 0 auto;
            padding: 8px 28px 0;
        }
        .funnel-form-placeholder {
            width: 100%;
            min-height: 500px;
            background: var(--bg-s);
            border: 2px solid var(--border);
            border-radius: var(--r);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .funnel-form-placeholder span {
            color: var(--text-m);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .funnel-footer {
            background: #000000;
            padding: 24px 0;
            text-align: center;
            margin-top: 60px;
            position: relative;
            z-index: 2;
        }
        .funnel-footer img { height: 28px; width: auto; margin-bottom: 8px; }
        .funnel-footer p {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.35);
        }

        @media (max-width: 768px) {
            .funnel-hero { padding: 78px 20px 0; }
            .funnel-hero h1 { font-size: 1.9rem; }
            .funnel-vsl { padding: 12px 20px 0; }
            .funnel-form { padding: 24px 20px 0; }
        }
    </style>
</head>
<body>
<div class="scroll-progress"></div>
<div class="page" id="page">

    <nav id="nav">
        <div class="container">
            <a href="https://justscale.co" class="logo">
                <img src="vault-logo.png" alt="The Vault" class="logo-img" style="filter: brightness(0); height: 72px; margin-top: -8px;">
            </a>
        </div>
    </nav>

    <div class="funnel-hero">
        <h1><strong>Everything we use to scale high-ticket products and services with paid ads.</strong></h1>
        <p class="sub">Every SOP we use, plus live coaching calls to walk you through exactly what you need to know.</p>
    </div>

    <div class="funnel-watch">Watch this first</div>

    <div class="funnel-vsl">
        <div class="funnel-vsl-box" style="aspect-ratio: auto; background: transparent; border: none;">
            <script src="https://fast.wistia.com/player.js" async></script>
            <script src="https://fast.wistia.com/embed/1vp08b0tvw.js" async type="module"></script>
            <style>wistia-player[media-id='1vp08b0tvw']:not(:defined) { background: center / contain no-repeat url('https://fast.wistia.com/embed/medias/1vp08b0tvw/swatch'); display: block; filter: blur(5px); padding-top:56.25%; border-radius: 14px; }</style>
            <wistia-player media-id="1vp08b0tvw" aspect="1.7777777777777777" style="width:100%; border-radius: 14px; overflow: hidden;"></wistia-player>
        </div>
    </div>

    <div class="funnel-vsl-sub">
        <p>If this sounds like what you've been looking for, apply below.</p>
    </div>

    <div class="funnel-form">
        <div data-tf-live="01KNNM5VG42WG0VMC53GBNWH6E" style="width:100%;height:600px;"></div>
        <script src="https://embed.typeform.com/next/embed.js"></script>
    </div>

    <div class="funnel-footer">
        <img src="logo-white.png" alt="JustScale">
        <p>&copy; 2026 JustScale. All rights reserved.</p>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="shared.js?v=20260407b"></script>
</body>
</html>
